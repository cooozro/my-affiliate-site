name: Cursor draft replenish

# Backup scheduler: processes pending cursor-draft-request.json when PC is off.
# Primary path: blog-automation.yml runs replenish right after publish.

on:
  push:
    branches: [main]
    paths:
      - "data/automation/cursor-draft-request.json"
  schedule:
    # Backup only — primary replenish runs inside blog-publish-slot.yml.
    # Do not use */5 here: Cursor agent runs often exceed 15min; frequent cron + cancel killed jobs.
    - cron: "*/15 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: cursor-draft-replenish
  cancel-in-progress: false

jobs:
  replenish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check pending request
        id: pending
        run: |
          if [ -f data/automation/cursor-draft-request.json ] && grep -q '"status": "pending"' data/automation/cursor-draft-request.json; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No pending cursor draft request"
          fi

      - uses: actions/setup-node@v6
        if: steps.pending.outputs.needed == 'true'
        with:
          node-version: "22.13"
          cache: npm

      - run: npm ci
        if: steps.pending.outputs.needed == 'true'

      - name: Install Cursor SDK (GHA scripts only)
        if: steps.pending.outputs.needed == 'true'
        run: npm install @cursor/sdk@1.0.22 --no-save

      - name: Run draft replenish
        if: steps.pending.outputs.needed == 'true'
        id: replenish
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SERP_PROVIDER: serper
        run: node scripts/automation/run-cursor-replenish.mjs

      - name: Persist replenish failure metadata
        if: failure() && steps.pending.outputs.needed == 'true'
        run: |
          bash scripts/ci-git-push.sh "chore(automation): record replenish failure"

      - name: Verify replenish produced a draft
        if: success() && steps.pending.outputs.needed == 'true'
        run: |
          if grep -q '"status": "pending"' data/automation/cursor-draft-request.json; then
            echo "::error::Replenish finished but cursor-draft-request is still pending"
            if [ -f data/automation/cursor-draft-request.json ]; then
              node -e "const r=require('./data/automation/cursor-draft-request.json'); console.error('lastError:', r.lastError||'(none)'); console.error('lastAttemptAt:', r.lastAttemptAt||'(none)');"
            fi
            exit 1
          fi
          echo "Replenish completed — request status is not pending"
      - name: Validate content
        if: success() && steps.pending.outputs.needed == 'true'
        run: npm run content:validate

      - name: Commit and push draft
        if: success() && steps.pending.outputs.needed == 'true'
        run: |
          bash scripts/ci-git-push.sh "chore(automation): cursor-draft-replenish"
