name: Cursor draft replenish

# Backup scheduler: processes pending cursor-draft-request.json when PC is off.
# Primary path: blog-automation.yml runs replenish right after publish.

on:
  push:
    branches: [main]
    paths:
      - "data/automation/cursor-draft-request.json"
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: cursor-draft-replenish
  cancel-in-progress: true

jobs:
  replenish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pending request
        id: pending
        run: |
          if [ -f data/automation/cursor-draft-request.json ] && grep -q '"status": "pending"' data/automation/cursor-draft-request.json; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No pending cursor draft request"
          fi

      - uses: actions/setup-node@v4
        if: steps.pending.outputs.needed == 'true'
        with:
          node-version: "22.13"
          cache: npm

      - run: npm ci
        if: steps.pending.outputs.needed == 'true'

      - name: Install Cursor SDK (GHA scripts only)
        if: steps.pending.outputs.needed == 'true'
        run: npm install @cursor/sdk@1.0.22 --no-save

      - name: Run draft replenish
        if: steps.pending.outputs.needed == 'true'
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          SERP_PROVIDER: serper
        run: node scripts/automation/run-cursor-replenish.mjs

      - name: Validate content
        if: steps.pending.outputs.needed == 'true'
        run: npm run content:validate

      - name: Commit and push draft
        if: steps.pending.outputs.needed == 'true'
        run: |
          bash scripts/ci-git-push.sh "chore(automation): cursor-draft-replenish"
