name: Blog automation

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      task:
        description: "Automation task"
        required: true
        type: choice
        default: status
        options:
          - status
          - publish-slot
          - publish
          - refresh-covers
          - refresh-post-covers

env:
  AUTOMATION_MODE: publish-only

concurrency:
  group: blog-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: npm

      - run: npm ci

      - name: Refresh duplicate cover images
        if: github.event_name == 'push'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          npm run content:refresh-duplicates || {
            echo "Duplicate cover refresh skipped or failed — continuing publish check"
            exit 0
          }

      - name: Resolve task from schedule
        id: task
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            echo "name=${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=publish-slot" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh post covers (vision)
        if: steps.task.outputs.name == 'refresh-post-covers'
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/refresh-post-covers.mjs

      - name: Run automation
        if: steps.task.outputs.name != 'refresh-post-covers'
        id: automation
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: |
          set -euo pipefail
          LOG_FILE="$(mktemp)"
          node scripts/automation/run.mjs "${{ steps.task.outputs.name }}" | tee "$LOG_FILE"
          if [ "${{ steps.task.outputs.name }}" = "refresh-covers" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "replenish_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ steps.task.outputs.name }}" = "refresh-post-covers" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "replenish_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if grep -q "^Published:" "$LOG_FILE"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q "Cursor draft replenish queued:" "$LOG_FILE"; then
            echo "replenish_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "replenish_needed=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q "Publish skipped:" "$LOG_FILE"; then
            grep "Publish skipped:" "$LOG_FILE" || true
          fi
          if grep -q "Daily publish limit" "$LOG_FILE"; then
            grep "Daily publish limit" "$LOG_FILE" || true
          fi
          if grep -q "No drafts to publish" "$LOG_FILE"; then
            grep "No drafts to publish" "$LOG_FILE" || true
          fi

      - name: Check pending draft replenish
        id: pending_replenish
        if: steps.task.outputs.name != 'refresh-post-covers'
        run: |
          if [ -f data/automation/cursor-draft-request.json ] && grep -q '"status": "pending"' data/automation/cursor-draft-request.json; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cursor draft replenish
        if: success() && steps.task.outputs.name != 'status' && steps.task.outputs.name != 'refresh-post-covers' && (steps.automation.outputs.replenish_needed == 'true' || steps.pending_replenish.outputs.needed == 'true')
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_MODEL: gpt-4o-mini
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: node scripts/automation/run-cursor-replenish.mjs

      - name: Validate content
        if: success() && steps.task.outputs.name != 'status'
        run: npm run content:validate

      - name: Commit and push changes
        if: success() && steps.task.outputs.name != 'status'
        run: |
          git config user.name "blog-automation[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts public/images/posts data/automation/
          if git diff --staged --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          git commit -m "chore(automation): ${{ steps.task.outputs.name }}"
          git push

      - name: Trigger Vercel redeploy
        if: success() && steps.task.outputs.name != 'status'
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: node scripts/trigger-vercel-deploy.mjs

      - name: Warm RSS and sitemap after deploy
        if: success() && steps.automation.outputs.published == 'true'
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: |
          sleep 120
          node scripts/automation/distributor.mjs warm
