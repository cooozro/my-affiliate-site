name: Blog automation

on:
  push:
    branches: [main]
  schedule:
    # Primary: every 10 minutes (GitHub often skips */15 on low-traffic repos).
    - cron: "*/10 * * * *"
    # Hourly backup UTC 22–15 ≈ KST 07:00–00:00
    - cron: "0 22-23 * * *"
    - cron: "0 0-15 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Automation task"
        required: true
        type: choice
        default: status
        options:
          - status
          - publish-slot
          - publish

env:
  AUTOMATION_MODE: publish-only

concurrency:
  group: blog-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Resolve task from schedule
        id: task
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            echo "name=${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=publish-slot" >> "$GITHUB_OUTPUT"
          fi

      - name: Run automation
        id: automation
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: |
          set -euo pipefail
          LOG_FILE="$(mktemp)"
          node scripts/automation/run.mjs "${{ steps.task.outputs.name }}" | tee "$LOG_FILE"
          if grep -q "^Published:" "$LOG_FILE"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q "Cursor draft replenish queued:" "$LOG_FILE"; then
            echo "replenish_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "replenish_needed=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q "Publish skipped:" "$LOG_FILE"; then
            grep "Publish skipped:" "$LOG_FILE" || true
          fi
          if grep -q "Daily publish limit" "$LOG_FILE"; then
            grep "Daily publish limit" "$LOG_FILE" || true
          fi
          if grep -q "No drafts to publish" "$LOG_FILE"; then
            grep "No drafts to publish" "$LOG_FILE" || true
          fi

      - name: Cursor draft replenish
        if: success() && steps.task.outputs.name != 'status' && steps.automation.outputs.replenish_needed == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: node scripts/automation/run-cursor-replenish.mjs

      - name: Validate content
        if: success() && steps.task.outputs.name != 'status'
        run: npm run content:validate

      - name: Commit and push changes
        if: success() && steps.task.outputs.name != 'status'
        run: |
          git config user.name "blog-automation[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts public/images/posts data/automation/
          if git diff --staged --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          git commit -m "chore(automation): ${{ steps.task.outputs.name }}"
          git push

      - name: Warm RSS and sitemap after deploy
        if: success() && steps.automation.outputs.published == 'true'
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: |
          sleep 120
          node scripts/automation/distributor.mjs warm
