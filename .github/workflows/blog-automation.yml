name: Blog automation

on:
  schedule:
    # KST 11:00 — publish slot 1
    - cron: "0 2 * * *"
    # KST 17:00 — publish slot 2 (6h after slot 1)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      task:
        description: "Automation task"
        required: true
        type: choice
        default: status
        options:
          - status
          - publish-slot
          - publish

env:
  AUTOMATION_MODE: publish-only

concurrency:
  group: blog-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Resolve task from schedule
        id: task
        run: |
          if [ -n "${{ github.event.inputs.task }}" ]; then
            echo "name=${{ github.event.inputs.task }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=publish-slot" >> "$GITHUB_OUTPUT"
          fi

      - name: Run automation
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: node scripts/automation/run.mjs "${{ steps.task.outputs.name }}"

      - name: Validate content
        if: success() && steps.task.outputs.name != 'status'
        run: npm run content:validate

      - name: Commit and push changes
        if: success() && steps.task.outputs.name != 'status'
        run: |
          git config user.name "blog-automation[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts public/images/posts data/automation/state.json
          if git diff --staged --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          git commit -m "chore(automation): ${{ steps.task.outputs.name }}"
          git push
