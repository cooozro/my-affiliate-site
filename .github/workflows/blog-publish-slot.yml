name: Blog publish slot

# Fast publish-only cron — separate from slow Cursor replenish so slots are not blocked.
on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "data/automation/**"
      - ".github/workflows/blog-publish-slot.yml"
  schedule:
    - cron: "*/5 * * * *"
    # Hourly backup UTC 22–15 ≈ KST 07:00–00:00 (GitHub often skips */5 on quiet repos)
    - cron: "0 22-23 * * *"
    - cron: "0 0-15 * * *"
  workflow_run:
    workflows: ["Blog automation"]
    types: [completed]
  workflow_dispatch:

env:
  AUTOMATION_MODE: publish-only

concurrency:
  group: blog-publish-slot
  cancel-in-progress: true

jobs:
  publish:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: npm

      - run: npm ci

      - name: Run publish slot
        id: publish
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.aipick.shop' }}
        run: |
          LOG_FILE="$(mktemp)"
          set +e
          node scripts/automation/run.mjs publish-slot 2>&1 | tee "$LOG_FILE"
          PUBLISH_EXIT="${PIPESTATUS[0]}"
          node scripts/automation/run.mjs daily-audit 2>&1 | tee -a "$LOG_FILE" || true
          set -e
          if [ "$PUBLISH_EXIT" -ne 0 ]; then
            echo "::error::publish-slot exited with code ${PUBLISH_EXIT}"
            tail -n 80 "$LOG_FILE"
            exit "$PUBLISH_EXIT"
          fi
          if grep -q "^Published:" "$LOG_FILE"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -q "Publish skipped:" "$LOG_FILE"; then
            grep "Publish skipped:" "$LOG_FILE" || true
          fi
          if grep -q "Automation health:" "$LOG_FILE"; then
            grep -E "Automation health:|ERROR \[|WARN \[" "$LOG_FILE" || true
          fi

      - name: Commit and push changes
        run: |
          git config user.name "blog-automation[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts public/images/posts data/automation/
          if git diff --staged --quiet; then
            echo "No content changes to commit"
            exit 0
          fi
          git commit -m "chore(automation): publish-slot"
          git push

      - name: Trigger Vercel redeploy
        if: steps.publish.outputs.published == 'true'
        continue-on-error: true
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: node scripts/trigger-vercel-deploy.mjs
